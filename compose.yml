services:
  analytics:
    image: ${DOCKERHUB_USERNAME}/my-analytics:${IMAGE_TAG:-latest}
    container_name: my-analytics
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./data:/app/data
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-3000}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/data/my_analytics.db}
      - RUST_LOG=${RUST_LOG:-my_analytics=info}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
    healthcheck:
      test:
        ["CMD", "sh", "-c", "wget -qO- http://localhost:${PORT:-3000}/ > /dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
